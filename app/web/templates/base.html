<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Legion{% endblock %}</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        referrerpolicy="no-referrer"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/legion.css') }}">
</head>
<body{% if legion_ui_opaque or legion_colorful_ascii_background %} class="{% if legion_ui_opaque %}opaque-ui{% endif %}{% if legion_ui_opaque and legion_colorful_ascii_background %} {% endif %}{% if legion_colorful_ascii_background %}colorful-background{% endif %}"{% endif %}>
<div class="background-glow"></div>
{% if legion_colorful_ascii_background and console_logo_art %}
<div class="logo-watermark" aria-hidden="true">
    <pre>{{ console_logo_art }}</pre>
</div>
{% endif %}
<div class="shell">
    <header class="topbar">
        <div class="topbar-brand">
            <h1>LEGION</h1>
        </div>
        <div class="topbar-meta">
            <span class="chip">{{ legion_version_label }}</span>
            <span class="chip">{{ legion_web_bind_label }}</span>
            <span class="chip">No auth</span>
            <span class="chip" id="live-status">Live</span>
        </div>
    </header>
    {% block content %}{% endblock %}
</div>
<script id="initial-snapshot" type="application/json">{{ snapshot | tojson }}</script>
<script>window.LEGION_WS_ENABLED = {{ "true" if ws_enabled else "false" }};</script>
<script>window.LEGION_OPAQUE_UI_ENABLED = {{ "true" if legion_ui_opaque else "false" }};</script>
<script>window.LEGION_COLORFUL_ASCII_BACKGROUND_ENABLED = {{ "true" if legion_colorful_ascii_background else "false" }};</script>
<script>window.LEGION_CONSOLE_LOGO_ART = {{ console_logo_art | tojson }};</script>
<script src="{{ url_for('static', filename='js/legion.js') }}" defer></script>
</body>
</html>
